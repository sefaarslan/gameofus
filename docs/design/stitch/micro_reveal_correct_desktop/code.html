<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Micro-Reveal - Secret Choice</title>

<style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff1ed 0%, #ffe9e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        
        /* Subtle entrance animation */
        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="text-on-surface">
<!-- Top App Bar (Hidden for gameplay focus, but structure maintained if needed globally) -->
<!-- Suppressed for transactional/focused gameplay screen -->
<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto">
<!-- Reveal Card -->
<article class="bg-surface-container-lowest rounded-xl shadow-lg shadow-primary/5 p-8 text-center flex flex-col items-center animate-pop-in relative overflow-hidden">
<!-- Decorative background element -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-fixed rounded-full blur-3xl opacity-50 -mr-16 -mt-16 pointer-events-none"></div>
<!-- Icon -->
<div class="w-24 h-24 bg-surface-container-highest rounded-full flex items-center justify-center mb-6 animate-float relative z-10 shadow-sm shadow-primary/10">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">favorite</span>
<!-- Sparkles -->
<span class="material-symbols-outlined absolute -top-2 -right-2 text-tertiary-container text-[24px]">auto_awesome</span>
</div>
<!-- Title -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-[#2e7d32] mb-2 relative z-10">
                Doğru bildin!
            </h1>
<!-- Detail Line -->
<div class="bg-surface-container py-3 px-6 rounded-full mb-6 mt-4 flex items-center justify-center gap-2 relative z-10 w-full shadow-sm shadow-primary/5">
<p class="font-body-md text-body-md text-on-surface-variant whitespace-nowrap">
                    Senin cevabın: <span class="font-bold text-on-surface">Evet</span>
</p>
<span class="w-1.5 h-1.5 bg-outline-variant rounded-full mx-1"></span>
<p class="font-body-md text-body-md text-on-surface-variant whitespace-nowrap">
                    Partnerin: <span class="font-bold text-on-surface">Evet</span>
</p>
</div>
<!-- Points & Bonus Container -->
<div class="flex flex-col items-center gap-3 mb-8 w-full relative z-10">
<!-- Points Badge -->
<div class="bg-tertiary-container/20 text-tertiary-container border border-tertiary-container/30 px-6 py-2 rounded-full inline-flex items-center gap-2 shadow-sm shadow-tertiary-container/10">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-md text-label-md font-bold tracking-wide uppercase text-on-tertiary-container">+3 puan (eminim)</span>
</div>
<!-- Bonus Text -->
<p class="font-body-md text-body-md text-on-surface-variant/80 italic">
                    Emin oldun ve haklı çıktın — bonus!
                </p>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md h-14 rounded-full flex items-center justify-center gap-2 hover:bg-on-primary-container active:scale-95 transition-all duration-200 relative z-10 shadow-md shadow-primary/20">
                Devam
                <span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</button>
</article>
</main>
<!-- Bottom Nav Bar (Suppressed for focused gameplay screen) -->
</body></html>
