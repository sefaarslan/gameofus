<div class="absolute bottom-[10%] right-[15%] w-96 h-96 bg-tertiary-fixed-dim/10 rounded-full blur-[80px] z-0 pointer-events-none mix-blend-multiply"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-2xl px-gutter md:px-container-padding-desktop">
<!-- Error Card -->
<article class="bg-surface-container-lowest rounded-xl shadow-[0_24px_48px_rgba(174,47,52,0.06)] border border-outline-variant/20 p-8 md:p-16 flex flex-col items-center text-center transform transition-all duration-500 hover:shadow-[0_32px_64px_rgba(174,47,52,0.08)]">
<!-- Illustration / Icon Area -->
<div class="relative mb-10 w-40 h-40 flex items-center justify-center">
<!-- Soft background glow behind icon -->
<div class="absolute inset-0 bg-surface-container-high rounded-full opacity-60 scale-110 animate-pulse" style="animation-duration: 4s;"></div>
<div class="absolute inset-0 bg-surface-variant rounded-full flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-[80px] text-primary" style="font-variation-settings: 'FILL' 1;">
                        hourglass_bottom
                    </span>
</div>
<!-- Floating decorative particles near icon -->
<div class="absolute -top-2 -right-2 w-6 h-6 bg-tertiary-fixed-dim rounded-full shadow-sm animate-bounce" style="animation-duration: 3s;"></div>
<div class="absolute bottom-4 -left-4 w-4 h-4 bg-primary-fixed-dim rounded-full shadow-sm animate-bounce" style="animation-duration: 2.5s; animation-delay: 0.5s;"></div>
</div>
<!-- Typography -->
<h1 class="font-headline-xl text-headline-xl text-on-background mb-4">
                Bu oyun odasının süresi doldu
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto mb-12">
                Güvenliğiniz ve oyun deneyiminiz için odalar belirli bir süre sonra kapanır.
            </p>
<!-- Actions -->
<div class="w-full flex flex-col items-center gap-4">
<button class="w-full max-w-xs bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md rounded-full py-5 px-8 shadow-[0_8px_16px_rgba(174,47,52,0.2)] hover:shadow-[0_12px_24px_rgba(174,47,52,0.3)] hover:-translate-y-1 active:scale-95 transition-all duration-300 ease-out flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined text-[20px] transition-transform group-hover:rotate-180 duration-500">
                        refresh
                    </span>
                    Yeni oyun başlat
                </button>
<button class="w-full max-w-xs bg-transparent hover:bg-surface-container text-on-surface-variant font-label-md text-label-md rounded-full py-4 px-8 active:scale-95 transition-all duration-300 ease-out mt-2">
                    Ana Sayfaya Dön
                </button>
</div>
</article>
</main>
<!-- Simple interaction script for card entrance -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('article');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
