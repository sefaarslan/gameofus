            box-shadow: 0 4px 16px rgba(174, 47, 52, 0.05);
        }

<body class="bg-surface min-h-screen font-body-md text-on-surface flex flex-col items-center justify-center p-container-padding-mobile">
<!-- Main Container -->
<main class="w-full max-w-md mx-auto bg-surface-container-lowest rounded-[24px] p-8 card-shadow flex flex-col gap-6">
<!-- Header -->
<header class="text-center mb-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">Game of Us</h1>
<p class="font-headline-md text-headline-md text-on-surface-variant">Tekrar hoş geldin</p>
</header>
<!-- Social Logins -->
<div class="flex flex-col gap-4">
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant text-on-surface rounded-full py-3 px-6 hover:bg-surface-container-low transition-colors min-h-[56px] font-label-md text-label-md">
<span class="material-symbols-outlined" data-icon="login">login</span>
                Google ile giriş yap
            </button>
<button class="w-full flex items-center justify-center gap-3 bg-on-surface text-surface-container-lowest rounded-full py-3 px-6 hover:opacity-90 transition-opacity min-h-[56px] font-label-md text-label-md">
<span class="material-symbols-outlined" data-icon="devices">devices</span>
                Apple ile giriş yap
            </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="flex-1 h-px bg-outline-variant opacity-50"></div>
<span class="font-label-md text-label-md text-on-surface-variant">veya e-posta ile</span>
<div class="flex-1 h-px bg-outline-variant opacity-50"></div>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">E-posta</label>
<div class="bg-secondary-container rounded-DEFAULT p-1 input-border border border-transparent transition-colors">
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface p-3 placeholder:text-outline" id="email" placeholder="ornek@eposta.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Şifre</label>
<div class="bg-secondary-container rounded-DEFAULT p-1 input-border border border-transparent transition-colors">
<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface p-3 placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-end mt-1">
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Şifreni mi unuttun?</a>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary rounded-full py-4 px-6 mt-4 hover:opacity-90 transition-opacity min-h-[56px] font-label-md text-label-md" type="button">
                Giriş yap
            </button>
</form>
<!-- Footer Link -->
<div class="text-center mt-2">
<p class="font-body-md text-body-md text-on-surface-variant">
                Hesabın yok mu? <a class="font-label-md text-label-md text-primary hover:underline" href="#">Kayıt ol</a>
</p>
</div>
</main>
