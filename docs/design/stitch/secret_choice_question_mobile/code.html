<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center overflow-hidden antialiased">
<!-- TopAppBar Semantic Shell Suppressed (Transactional Page) -->
<!-- Main Container -->
<main class="w-full max-w-[720px] flex-1 flex flex-col px-container-padding-mobile pt-8 pb-32 h-[884px]">
<!-- Header / Progress -->
<header class="w-full mb-8 flex flex-col gap-4">
<div class="flex items-center justify-between">
<button aria-label="Geri Dön" class="w-12 h-12 flex items-center justify-center text-on-surface-variant hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md text-primary">Soru 3 / 10</div>
<div class="w-12"></div> <!-- Spacer for centering -->
</div>
<!-- Progress Bar -->
<div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-tertiary-container rounded-full w-[30%] transition-all duration-500 ease-in-out"></div>
</div>
<div class="flex justify-center mt-2">
<span class="px-4 py-1 bg-tertiary-container text-on-tertiary-container font-label-md text-label-md rounded-full">Secret Choice</span>
</div>
</header>
<!-- Question Card -->
<section class="w-full bg-surface-container-lowest rounded-[24px] p-8 shadow-[0_16px_32px_-12px_rgba(174,47,52,0.1)] mb-8 flex flex-col items-center text-center relative overflow-hidden">
<!-- Decorative blob behind text -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-container opacity-20 blur-2xl rounded-full"></div>
<div class="absolute -bottom-10 -left-10 w-32 h-32 bg-tertiary-container opacity-20 blur-2xl rounded-full"></div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-4 z-10">Her gün mesajlaşmak senin için önemli mi?</h1>
</section>
<!-- Options -->
<section class="w-full flex flex-col gap-4 mb-auto">
<!-- Selected Option -->
<label class="w-full relative cursor-pointer group">
<input checked="" class="peer sr-only" name="answer" type="radio" value="evet"/>
<div class="w-full p-6 bg-surface-container-lowest border-2 border-primary rounded-xl flex items-center justify-between transition-all duration-300 shadow-[0_8px_16px_-8px_rgba(174,47,52,0.2)] peer-checked:bg-primary-container/10">
<span class="font-headline-md text-headline-md text-primary">Evet</span>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
<!-- Unselected Option 1 -->
<label class="w-full relative cursor-pointer group">
<input class="peer sr-only" name="answer" type="radio" value="kararsiz"/>
<div class="w-full p-6 bg-surface-container-lowest border-2 border-transparent rounded-xl flex items-center justify-between transition-all duration-300 shadow-sm hover:shadow-md hover:border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container/10">
<span class="font-headline-md text-headline-md text-on-surface-variant">Kararsız</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-0 transition-opacity group-hover:opacity-50" style="font-variation-settings: 'FILL' 0;">radio_button_unchecked</span>
</div>
</label>
<!-- Unselected Option 2 -->
<label class="w-full relative cursor-pointer group">
<input class="peer sr-only" name="answer" type="radio" value="hayir"/>
<div class="w-full p-6 bg-surface-container-lowest border-2 border-transparent rounded-xl flex items-center justify-between transition-all duration-300 shadow-sm hover:shadow-md hover:border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container/10">
<span class="font-headline-md text-headline-md text-on-surface-variant">Hayır</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-0 transition-opacity group-hover:opacity-50" style="font-variation-settings: 'FILL' 0;">radio_button_unchecked</span>
</div>
</label>
</section>
<!-- Micro Helper Text -->
<div class="w-full text-center mt-6 flex items-center justify-center gap-2 text-on-surface-variant font-body-md text-body-md opacity-80">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
<p>Cevabın partnerine gösterilmeyecek, o tahmin edecek</p>
</div>
</main>
<!-- Sticky Footer Action -->
<div class="fixed bottom-0 left-0 w-full p-container-padding-mobile pb-safe bg-gradient-to-t from-surface via-surface to-transparent z-40 flex justify-center">
<button class="w-full max-w-[720px] min-h-[56px] bg-primary text-on-primary rounded-full font-headline-md text-headline-md shadow-[0_8px_16px_-4px_rgba(174,47,52,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-transform duration-200">
            Devam
        </button>
</div>
