<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game of Us - Secret Choice</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#8c706f",
                        "surface-tint": "#ae2f34",

                        "error-container": "#ffdad6",
                        "inverse-surface": "#442a22",

                        "primary-container": "#ff6b6b",
                        "secondary-fixed": "#eae1dc",
                        "on-tertiary-fixed": "#221b00",
                        "primary-fixed": "#ffdad8",
                        "on-background": "#2c160e",
                        "on-primary-fixed": "#410006",
                        "surface-container-high": "#ffe2da",
                        "outline-variant": "#e0bfbd",
                        "on-secondary-container": "#68615e",
                        "tertiary": "#705d00",
                        "surface": "#fff8f6",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary": "#ae2f34",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1f1b18",
                        "surface-container-low": "#fff1ed",
                        "on-tertiary": "#ffffff",
                        "background": "#fff8f6",
                        "surface-container": "#ffe9e3",
                        "surface-bright": "#fff8f6",
                        "on-tertiary-container": "#4c3e00",
                        "tertiary-container": "#caa800",
                        "tertiary-fixed-dim": "#e8c426",
                        "on-tertiary-fixed-variant": "#554500",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffe173",
                        "primary-fixed-dim": "#ffb3b0",
                        "surface-container-highest": "#ffdbd0",
                        "on-primary-container": "#6d0010",
                        "inverse-on-surface": "#ffede8",
                        "on-surface-variant": "#584140",
                        "secondary-container": "#e7ded9",
                        "surface-variant": "#ffdbd0",
                        "surface-dim": "#fbd1c4",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#cec5c0",
                        "on-primary-fixed-variant": "#8c1520",
                        "on-secondary-fixed-variant": "#4b4642",
                        "inverse-primary": "#ffb3b0",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-padding-mobile": "24px",
                        "base": "8px",
                        "section-gap": "40px",
                        "container-padding-desktop": "48px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Quicksand"],
                        "label-md": ["Quicksand"],
                        "headline-md": ["Quicksand"],
                        "body-md": ["Quicksand"],
                        "headline-lg-mobile": ["Quicksand"],
                        "headline-lg": ["Quicksand"],
                        "body-lg": ["Quicksand"]
                    },
                    "fontSize": {
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "500" }]

                }
            }
        }

<style>
        body { font-family: 'Quicksand', sans-serif; background-color: theme('colors.secondary-fixed'); }
        .soft-shadow { box-shadow: 0 16px 32px -12px rgba(174, 47, 52, 0.08); }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen pb-[100px]">
<!-- Top Navigation Area (Supressed nav shell due to focused game state, using custom top bar) -->
<header class="sticky top-0 z-40 bg-surface/80 backdrop-blur-md px-container-padding-mobile py-4 flex justify-between items-center w-full">
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container-low text-on-surface hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="text-center">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block">Soru 3 / 10</span>
<div class="w-24 h-1.5 bg-surface-variant rounded-full mt-1 mx-auto overflow-hidden">
<div class="w-[30%] h-full bg-gradient-to-r from-primary to-tertiary-container rounded-full"></div>
</div>
</div>
<div class="font-label-md text-label-md bg-tertiary-container/20 text-tertiary-container px-3 py-1 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="stars" data-weight="fill" style="font-variation-settings: 'FILL' 1;">stars</span>
            12
        </div>
</header>
<main class="px-container-padding-mobile mt-section-gap max-w-[720px] mx-auto space-y-section-gap">
<!-- Question Area -->
<div class="text-center px-4">
<span class="inline-block px-3 py-1 bg-secondary-fixed text-secondary font-label-md text-label-md rounded-full mb-4">Gizli Seçim</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Her gün mesajlaşmak senin için önemli mi?</h1>
</div>
<!-- Self Answer Section -->
<div class="glass-panel rounded-[2rem] p-6 soft-shadow relative">
<div class="flex items-center gap-2 mb-6 text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
<h2 class="font-label-md text-label-md uppercase tracking-wide">Senin cevabın — partnerine gösterilmez</h2>
</div>
<div class="flex flex-col gap-3">
<button class="w-full text-left px-6 py-4 rounded-xl border-2 border-primary bg-primary-fixed text-on-primary-fixed font-headline-md text-headline-md transition-all flex justify-between items-center">
                    Evet
                    <span class="material-symbols-outlined text-primary" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="w-full text-left px-6 py-4 rounded-xl border-2 border-transparent bg-surface-container-low text-on-surface font-headline-md text-headline-md hover:bg-surface-variant transition-all">
                    Kararsız
                </button>
<button class="w-full text-left px-6 py-4 rounded-xl border-2 border-transparent bg-surface-container-low text-on-surface font-headline-md text-headline-md hover:bg-surface-variant transition-all">
                    Hayır
                </button>
</div>
</div>
<!-- Connection Line -->
<div class="flex justify-center -my-6 relative z-10">
<div class="h-12 border-l-2 border-dashed border-outline-variant"></div>
</div>
<!-- Partner Guess Section -->
<div class="glass-panel rounded-[2rem] p-6 soft-shadow relative mt-0">
<div class="flex items-center gap-2 mb-6 text-tertiary-container">
<span class="material-symbols-outlined text-[20px]" data-icon="psychology" data-weight="fill" style="font-variation-settings: 'FILL' 1;">psychology</span>
<h2 class="font-label-md text-label-md uppercase tracking-wide">Partnerin ne cevap verdi sence?</h2>
</div>
<div class="flex flex-col gap-3 mb-8">
<button class="w-full text-left px-6 py-4 rounded-xl border-2 border-transparent bg-surface-container-low text-on-surface font-headline-md text-headline-md hover:bg-surface-variant transition-all">
                    Evet
                </button>
<button class="w-full text-left px-6 py-4 rounded-xl border-2 border-transparent bg-surface-container-low text-on-surface font-headline-md text-headline-md hover:bg-surface-variant transition-all">
                    Kararsız
                </button>
<button class="w-full text-left px-6 py-4 rounded-xl border-2 border-tertiary-container bg-tertiary-fixed text-on-tertiary-fixed font-headline-md text-headline-md transition-all flex justify-between items-center">
                    Hayır
                    <span class="material-symbols-outlined text-tertiary-container" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
<!-- Confidence Pills -->
<div class="space-y-3">
<p class="font-label-md text-label-md text-on-surface-variant text-center">Ne kadar eminsin?</p>
<div class="flex justify-center gap-2">
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-md text-label-md transition-colors">Tahmin</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-md text-label-md transition-colors">Sanırım</button>
<button class="px-5 py-2 rounded-full border border-transparent bg-tertiary-container text-on-tertiary font-label-md text-label-md shadow-md shadow-tertiary-container/30 transition-colors">Eminim</button>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-surface via-surface/90 to-transparent pt-12 pb-8 px-container-padding-mobile z-50">
<div class="max-w-[720px] mx-auto">
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="lock_clock">lock_clock</span>
                Tahmini kilitle
            </button>
</div>
</div>
</body></html>
