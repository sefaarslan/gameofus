<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-container-padding-mobile md:p-container-padding-desktop font-body-md text-on-surface">
<main class="w-full max-w-[480px]">
<!-- Brand Logo Area -->
<div class="text-center mb-8">
<h1 class="font-headline-xl text-headline-xl text-primary font-bold">Game of Us</h1>
</div>
<!-- Main Card -->
<div class="bg-surface rounded-xl shadow-[0_16px_32px_-8px_rgba(174,47,52,0.05)] p-8 md:p-10 relative overflow-hidden">
<!-- Decorative blur element -->
<div class="absolute -top-20 -right-20 w-40 h-40 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-20 pointer-events-none"></div>
<div class="text-center mb-8 relative z-10">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Devam etmek için hesap oluştur</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Ücretsiz oynadın, şimdi devam et</p>
</div>
<!-- Social Logins -->
<div class="flex flex-col sm:flex-row gap-4 mb-8 relative z-10">
<button class="flex-1 flex items-center justify-center gap-2 h-14 bg-surface border border-outline-variant rounded-full font-label-md text-label-md text-on-surface hover:bg-surface-variant transition-colors group">
<img alt="Google" class="w-5 h-5 group-hover:scale-110 transition-transform" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaH7VJ1IBeNbHiqn4iep3f_wx3W0jKGWdF_L5L4Nnz8EWUKQwOKJ15-pknIzV4c8NGl1D7xP2RtWivdWMPuJ9Jqx-05IiTRi98Vn6bOJKobiwCSyvJjLlZ9QFMx4xFYNDQKh4epx3B-qPTuRXu81HSj89k_nm7Ru4bWGP1sGAufcJNHSgc4QtRE_6F770T50vhlE3-EPVpr3rUCknDHUJUHLutMmBhmUFa5fK7-pVAL37m-AwW9RyIX6QsLzKADGeQSr_qXr3vf_g"/>
                    Google
                </button>
<button class="flex-1 flex items-center justify-center gap-2 h-14 bg-on-surface rounded-full font-label-md text-label-md text-surface hover:bg-on-surface/90 transition-colors group">
<span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">ios</span>
                    Apple
                </button>
</div>
<!-- Divider -->
<div class="flex items-center mb-8 relative z-10">
<div class="flex-1 border-t border-outline-variant/50"></div>
<span class="px-4 font-body-md text-body-md text-on-surface-variant">veya e-posta ile</span>
<div class="flex-1 border-t border-outline-variant/50"></div>
</div>
<!-- Form -->
<form class="space-y-6 relative z-10" onsubmit="event.preventDefault();">
<div class="space-y-4">
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface ml-4" for="email">E-posta</label>
<input class="h-14 bg-secondary-container border-transparent focus:border-primary focus:bg-surface focus:ring-0 rounded-full px-6 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 transition-colors" id="email" placeholder="ornek@eposta.com" type="email"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface ml-4" for="password">Şifre</label>
<input class="h-14 bg-secondary-container border-transparent focus:border-primary focus:bg-surface focus:ring-0 rounded-full px-6 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface ml-4" for="password-confirm">Şifre tekrar</label>
<input class="h-14 bg-secondary-container border-transparent focus:border-primary focus:bg-surface focus:ring-0 rounded-full px-6 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 transition-colors" id="password-confirm" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-label-md text-label-md shadow-lg shadow-primary/20 hover:bg-primary/90 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all flex items-center justify-center mt-2" type="submit">
                    Hesap oluştur
                </button>
</form>
</div>

<div class="mt-8 text-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-1 group" href="#">
                Zaten hesabın var mı? <span class="font-label-md text-label-md underline group-hover:no-underline">Giriş yap</span>
</a>
