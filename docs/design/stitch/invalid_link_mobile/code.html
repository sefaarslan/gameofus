<body class="bg-surface text-on-surface flex flex-col min-h-screen relative overflow-hidden">
<!-- TopAppBar -->
<header class="bg-surface shadow-sm shadow-primary/5 docked full-width top-0 z-10 flex justify-between items-center w-full px-container-mobile h-16">
<button class="text-primary hover:bg-secondary-container/50 transition-colors p-2 rounded-full flex items-center justify-center">

</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Game of Us</h1>
<div class="flex gap-2">
<button class="text-on-secondary-container hover:bg-secondary-container/50 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="help" style="font-variation-settings: 'FILL' 0;">help</span>
</button>
<button class="text-on-secondary-container hover:bg-secondary-container/50 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
</div>
</header>
<!-- Main Content Area (Empty State) -->
<main class="flex-grow flex items-center justify-center p-gutter relative z-0">
<!-- Decorative Background Blob -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-surface-variant rounded-full blur-[80px] opacity-50 z-[-1]"></div>
<!-- Empty State Card -->
<div class="bg-on-primary rounded-xl p-8 w-full max-w-[400px] shadow-[0_16px_32px_rgba(174,47,52,0.05)] flex flex-col items-center text-center relative z-10">
<!-- Illustration Area -->
<div class="mb-8 relative flex justify-center items-center w-40 h-40">
<div class="absolute inset-0 bg-primary-fixed opacity-30 rounded-full animate-pulse" style="animation-duration: 3s;"></div>
<div class="absolute inset-4 bg-surface-variant rounded-full"></div>
<span class="material-symbols-outlined text-[80px] text-primary relative z-10" style="font-variation-settings: 'FILL' 0;">link_off</span>
</div>
<!-- Content -->
<h2 class="font-headline-md text-headline-md text-on-surface mb-4">Bu link geçersiz</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 px-4">

            </p>
<!-- Action Button -->
<button class="w-full min-h-[56px] bg-primary text-on-primary font-label-md text-label-md font-bold rounded-full hover:opacity-90 active:scale-95 transition-all shadow-[0_8px_16px_rgba(174,47,52,0.15)] flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
