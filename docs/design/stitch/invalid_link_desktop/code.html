<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game of Us - Geçersiz Link</title>

                        "DEFAULT": "1rem",

<style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: theme('colors.background');
        }
        
        .soft-gradient-bg {
            background: linear-gradient(135deg, theme('colors.surface-container-low') 0%, theme('colors.surface-variant') 100%);
        }
    </style>

<body class="min-h-screen flex flex-col antialiased text-on-surface">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex justify-between items-center px-container-padding-mobile md:px-container-padding-desktop py-4 w-full bg-surface dark:bg-on-background shadow-sm shadow-primary/5">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">
            Game of Us
        </div>
<div class="flex gap-4 items-center">
<button class="w-12 h-12 rounded-full flex items-center justify-center text-on-surface-variant font-medium hover:bg-primary-container/10 transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center text-on-surface-variant font-medium hover:bg-primary-container/10 transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Area - Full height with gradient -->
<main class="flex-grow flex items-center justify-center p-gutter soft-gradient-bg">
<!-- Large Centered Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_16px_32px_rgba(174,47,52,0.05)] w-full max-w-[720px] p-[48px] md:p-[64px] flex flex-col items-center text-center mx-auto transition-transform duration-300 hover:-translate-y-2 relative overflow-hidden">
<!-- Subtle decorative elements in the background of the card -->
<div class="absolute -top-16 -left-16 w-32 h-32 bg-primary-fixed rounded-full blur-3xl opacity-50"></div>
<div class="absolute -bottom-24 -right-24 w-48 h-48 bg-tertiary-fixed rounded-full blur-3xl opacity-30"></div>
<!-- Enlarged Broken Link Icon / Illustration placeholder -->
<div class="w-40 h-40 mb-8 rounded-full bg-surface-container flex items-center justify-center relative z-10">
<span class="material-symbols-outlined text-[80px] text-primary" data-icon="link_off" style="font-variation-settings: 'FILL' 0, 'wght' 300;">link_off</span>
</div>
<!-- Text Content -->
<h1 class="font-headline-xl text-headline-xl text-on-background mb-4 relative z-10">
                Bu link geçersiz
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[480px] mx-auto mb-12 relative z-10">
                Girmek istediğiniz oyun odası bulunamadı veya link hatalı olabilir.
            </p>
<!-- Primary Action Button -->
<button class="bg-primary text-on-primary font-label-md text-label-md rounded-full px-8 min-h-[56px] flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-primary/20 relative z-10">
<span class="material-symbols-outlined" data-icon="add">add</span>
                Yeni oyun oluştur
            </button>
<!-- Secondary helpful link -->
<a class="mt-8 font-body-md text-body-md text-secondary hover:text-primary transition-colors underline-offset-4 hover:underline relative z-10" href="#">
                Ana sayfaya dön
            </a>
</div>
</main>
</body></html>
