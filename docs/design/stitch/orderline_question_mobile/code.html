<!-- Minimal Drag & Drop JS for Visual Feedback -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('sortable-list');
            let draggedItem = null;

            list.addEventListener('dragstart', (e) => {
                if(e.target.draggable) {
                    draggedItem = e.target;
                    setTimeout(() => {
                        e.target.classList.add('drag-active');
                    }, 0);
                }
            });

            list.addEventListener('dragend', (e) => {
                if(e.target.draggable) {
                    e.target.classList.remove('drag-active');
                    draggedItem = null;
                    updateNumbers();
                }
            });

            list.addEventListener('dragover', (e) => {
                e.preventDefault();
                const afterElement = getDragAfterElement(list, e.clientY);
                const currentDraggable = document.querySelector('.drag-active');
                if(currentDraggable) {
                    if (afterElement == null) {
                        list.appendChild(currentDraggable);
                    } else {
                        list.insertBefore(currentDraggable, afterElement);
                    }
                }
            });

            function getDragAfterElement(container, y) {
                const draggableElements = [...container.querySelectorAll('[draggable="true"]:not(.drag-active)')];
                
                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }

            function updateNumbers() {
                const items = list.querySelectorAll('[draggable="true"]');
                items.forEach((item, index) => {
                    const numberDiv = item.querySelector('.bg-primary-container');
                    if(numberDiv) {
                        numberDiv.textContent = index + 1;
                    }
                });
            }
        });
    </script>
