<div class="h-full w-[30%] bg-gradient-to-r from-primary to-tertiary rounded-full transition-all duration-1000 ease-out"></div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-4 opacity-80">

                </p>
</div>

<!-- Question Title -->
<h1 class="font-headline-lg text-headline-lg text-on-surface text-center leading-tight">
                    Her gün mesajlaşmak senin için önemli mi?
                </h1>
<!-- Options Stack -->
<div class="flex flex-col gap-4">
<!-- Option 1: Selected (Warm Coral) -->
<button class="w-full bg-primary-container text-on-primary-container border-2 border-primary p-6 rounded-[24px] flex items-center justify-center font-headline-md text-headline-md transition-all shadow-[0_8px_20px_-8px_rgba(174,47,52,0.3)] transform scale-[1.02]">
                        Evet
                    </button>
<!-- Option 2: Default -->
<button class="w-full bg-surface-container-low text-on-surface border border-transparent hover:border-outline-variant/50 hover:bg-surface-container transition-all p-6 rounded-[24px] flex items-center justify-center font-headline-md text-headline-md">
                        Kararsız
                    </button>
<!-- Option 3: Default -->
<button class="w-full bg-surface-container-low text-on-surface border border-transparent hover:border-outline-variant/50 hover:bg-surface-container transition-all p-6 rounded-[24px] flex items-center justify-center font-headline-md text-headline-md">
                        Hayır
                    </button>
</div>

<p class="text-center font-body-md text-body-md text-on-surface-variant flex items-center justify-center gap-2 bg-surface-container-low py-3 px-6 rounded-full w-max mx-auto">
<span class="material-symbols-outlined text-[20px] text-primary">visibility_off</span>

                    </p>
