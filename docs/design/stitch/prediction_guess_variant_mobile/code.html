<body class="bg-background text-on-background min-h-screen flex flex-col md:hidden overflow-x-hidden relative">
<!-- Gameplay Task Header (Suppresses Global Nav due to focused intent) -->
<header class="flex items-center justify-between px-container-padding-mobile py-6 sticky top-0 z-40 bg-background/80 backdrop-blur-md">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-[0_4px_12px_rgba(174,47,52,0.05)] text-on-surface hover:scale-95 transition-transform active:bg-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Mode Indicator (Amber/Gold for Guess Mode) -->
<div class="px-4 py-2 bg-tertiary-container/10 rounded-full border border-tertiary-container/30 flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary fill" data-icon="psychology_alt" style="font-size: 18px;">psychology_alt</span>
<span class="font-label-md text-label-md text-tertiary uppercase tracking-wider">Tahmin Et</span>
</div>
<!-- Placeholder to balance flex-between -->
<div class="w-12 h-12 flex items-center justify-center">
<span class="font-label-md text-label-md text-on-surface-variant">3/10</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-padding-mobile pb-[120px] flex flex-col gap-8 animate-fade-in">
<!-- Screen Title -->
<div class="pt-2 text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">
                Partnerin ne seçer sence?
            </h1>
</div>
<!-- Question Card (Core Interaction Element) -->
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_16px_32px_rgba(174,47,52,0.04)] relative z-10 flex flex-col items-center justify-center min-h-[160px] border border-outline-variant/10">
<!-- Decorative icon to anchor the question -->
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center mb-4 text-primary">
<span class="material-symbols-outlined fill" data-icon="weekend">weekend</span>
</div>
<p class="font-headline-md text-headline-md text-center text-on-surface leading-snug">
                "Boş bir cumartesi gününde ne yapmayı tercih edersin?"
            </p>
</div>
<!-- Options Stack -->
<div class="flex flex-col gap-4" id="options-container">
<!-- Option 1 (Pre-selected to demonstrate Amber/Gold state) -->
<button class="guess-option w-full bg-tertiary-fixed text-on-tertiary-fixed-variant border-2 border-tertiary rounded-lg p-5 flex items-center justify-between shadow-[0_8px_16px_rgba(202,168,0,0.15)] transition-all active:scale-[0.98] transform" data-selected="true">
<span class="font-body-lg text-body-lg text-left pr-4 font-semibold">

<div class="w-6 h-6 rounded-full border-2 border-tertiary flex items-center justify-center bg-tertiary text-on-tertiary relative flex-shrink-0">
<span class="material-symbols-outlined text-[16px] font-bold icon-check absolute" data-icon="check">check</span>
<span class="w-full h-full rounded-full bg-transparent icon-circle absolute opacity-0"></span>
</div>
</button>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const options = document.querySelectorAll('.guess-option');
            
            options.forEach(option => {
                option.addEventListener('click', function() {
                    // Reset all options to unselected state
                    options.forEach(opt => {
                        // Remove Gold/Amber Selected styles
                        opt.classList.remove('bg-tertiary-fixed', 'text-on-tertiary-fixed-variant', 'border-tertiary', 'shadow-[0_8px_16px_rgba(202,168,0,0.15)]');
                        // Add base unselected styles
                        opt.classList.add('bg-surface-container-lowest', 'text-on-surface', 'border-transparent', 'shadow-[0_8px_16px_rgba(174,47,52,0.04)]');
                        opt.querySelector('span.font-body-lg').classList.remove('font-semibold');
                        
                        // Reset Checkbox circle
                        const circleContainer = opt.querySelector('div.rounded-full');
                        circleContainer.classList.remove('border-tertiary', 'bg-tertiary', 'text-on-tertiary');
                        circleContainer.classList.add('border-outline-variant');
                        
                        opt.querySelector('.icon-check').classList.add('opacity-0');
                        opt.querySelector('.icon-circle').classList.remove('opacity-0');
                    });
                    
                    // Apply Gold/Amber Selected styles to clicked option
                    this.classList.remove('bg-surface-container-lowest', 'text-on-surface', 'border-transparent', 'shadow-[0_8px_16px_rgba(174,47,52,0.04)]');
                    this.classList.add('bg-tertiary-fixed', 'text-on-tertiary-fixed-variant', 'border-tertiary', 'shadow-[0_8px_16px_rgba(202,168,0,0.15)]');
                    this.querySelector('span.font-body-lg').classList.add('font-semibold');
                    
                    // Set Checkbox circle to active
                    const activeCircleContainer = this.querySelector('div.rounded-full');
                    activeCircleContainer.classList.remove('border-outline-variant');
                    activeCircleContainer.classList.add('border-tertiary', 'bg-tertiary', 'text-on-tertiary');
                    
                    this.querySelector('.icon-check').classList.remove('opacity-0');
                    this.querySelector('.icon-circle').classList.add('opacity-0');
                    
                    // Add subtle pop animation
                    this.style.transform = 'scale(1.02)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 150);
                });
            });
        });
    </script>
