<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yeni Oyun Oluştur - Game of Us</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#fbd1c4",
                        "secondary-fixed-dim": "#cec5c0",
                        "on-primary-container": "#6d0010",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#4b4642",
                        "tertiary": "#705d00",
                        "on-background": "#2c160e",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#eae1dc",
                        "surface-bright": "#fff8f6",
                        "inverse-on-surface": "#ffede8",
                        "surface-container-highest": "#ffdbd0",
                        "surface-container": "#ffe9e3",
                        "on-tertiary-fixed": "#221b00",
                        "primary-fixed": "#ffdad8",
                        "secondary": "#635d59",
                        "on-surface": "#2c160e",
                        "inverse-surface": "#442a22",
                        "tertiary-fixed-dim": "#e8c426",
                        "outline-variant": "#e0bfbd",
                        "on-tertiary-fixed-variant": "#554500",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#68615e",
                        "background": "#fff8f6",
                        "primary": "#ae2f34",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#4c3e00",
                        "on-secondary-fixed": "#1f1b18",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#584140",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#ffb3b0",
                        "tertiary-fixed": "#ffe173",
                        "surface-container-low": "#fff1ed",
                        "surface": "#fff8f6",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#8c1520",
                        "on-primary-fixed": "#410006",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#ffe2da",
                        "tertiary-container": "#caa800",
                        "primary-fixed-dim": "#ffb3b0",
                        "primary-container": "#ff6b6b",
                        "surface-tint": "#ae2f34",
                        "surface-variant": "#ffdbd0",
                        "secondary-container": "#e7ded9",
                        "outline": "#8c706f"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding-mobile": "24px",
                        "container-padding-desktop": "48px",
                        "gutter": "24px",
                        "section-gap": "40px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Quicksand"],
                        "headline-lg": ["Quicksand"],
                        "headline-lg-mobile": ["Quicksand"],
                        "label-md": ["Quicksand"],
                        "body-lg": ["Quicksand"],
                        "headline-xl": ["Quicksand"],
                        "body-md": ["Quicksand"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Quicksand', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .icon-fill { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex">
<!-- Side Navigation Shell (Modified for Steps) -->
<nav class="fixed left-0 top-0 h-full border-r border-outline-variant/30 bg-surface-container-low h-screen w-[300px] hidden md:flex flex-col z-50 p-container-padding-desktop">
<!-- Brand / Header -->
<div class="mb-12">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Game of Us</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Yeni bir deneyim başlat.</p>
</div>
<!-- Progress Steps -->
<div class="flex-1">
<ul class="space-y-4">
<!-- Step 1: Active -->
<li class="flex items-center gap-4 text-primary font-bold border-r-4 border-primary bg-primary-container/10 p-3 rounded-l-lg transition-colors">
<span class="material-symbols-outlined icon-fill">steppers</span>
<span class="font-body-lg text-body-lg">Adım 1: Kurulum</span>
</li>
<!-- Step 2: Inactive -->
<li class="flex items-center gap-4 text-on-surface-variant font-medium p-3 hover:bg-surface-container-high transition-all rounded-l-lg hover:translate-x-1">
<span class="material-symbols-outlined">share</span>
<span class="font-body-lg text-body-lg">Adım 2: Link Paylaş</span>
</li>
<!-- Step 3: Inactive -->
<li class="flex items-center gap-4 text-on-surface-variant font-medium p-3 hover:bg-surface-container-high transition-all rounded-l-lg hover:translate-x-1">
<span class="material-symbols-outlined">play_arrow</span>
<span class="font-body-lg text-body-lg">Adım 3: Başla</span>
</li>
</ul>
</div>
<!-- Bottom Action (Optional based on design system, usually settings or similar, keeping minimal for flow) -->
<div class="mt-auto pt-8 border-t border-outline-variant/30">
<button class="flex items-center gap-3 text-on-surface-variant font-medium hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
<span>Ana Sayfaya Dön</span>
</button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 ml-[300px] min-h-screen p-container-padding-desktop flex flex-col items-center justify-center bg-surface-bright">
<!-- Form Card (Bento/Glass style hint: large radius, soft shadow, airy) -->
<div class="w-full max-w-[720px] bg-white rounded-[24px] shadow-[0_16px_32px_-12px_rgba(174,47,52,0.05)] p-8 md:p-12 border border-outline-variant/10">
<header class="mb-10 text-center">
<h2 class="font-headline-xl text-headline-xl text-on-background mb-3">Yeni Oyun Oluştur</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Detayları belirle ve partnerinle oynamaya başla.</p>
</header>
<form class="space-y-section-gap">
<!-- Player Details Section -->
<div class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Input 1: Your Name -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="player_name">İsmin <span class="text-error">*</span></label>
<input class="bg-surface-dim border-none rounded-lg p-4 font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:bg-white transition-all placeholder:text-outline" id="player_name" name="player_name" placeholder="Adını gir" required="" type="text"/>
</div>
<!-- Input 2: Partner Name -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="partner_name">Partner adı (opsiyonel)</label>
<input class="bg-surface-dim border-none rounded-lg p-4 font-body-md text-body-md text-on-background focus:ring-2 focus:ring-primary focus:bg-white transition-all placeholder:text-outline" id="partner_name" name="partner_name" placeholder="Partnerinin adını gir" type="text"/>
</div>
</div>
</div>
<hr class="border-outline-variant/20"/>
<!-- Game Mode Selector -->
<div class="space-y-4">
<h3 class="font-headline-md text-headline-md text-on-background">Oyun Modu</h3>
<div class="grid grid-cols-1 gap-4">
<!-- Mode 1: Secret Choice (Selected) -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="game_mode" type="radio" value="secret"/>
<div class="flex items-start p-6 rounded-xl bg-white border-2 border-primary ring-4 ring-primary/10 transition-all">
<div class="mr-4 text-primary bg-primary-container/20 p-3 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined icon-fill text-[32px]">visibility_off</span>
</div>
<div class="flex-1">
<div class="flex items-center gap-3 mb-1">
<h4 class="font-headline-md text-headline-md text-on-background">Secret Choice</h4>
<span class="bg-tertiary-fixed text-on-tertiary-container font-label-md text-label-md px-2 py-0.5 rounded-full text-xs">Önerilen</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Seçenekler arasından gizlice seçimini yap.</p>
</div>
<div class="ml-4 text-primary opacity-100">
<span class="material-symbols-outlined icon-fill text-[28px]">check_circle</span>
</div>
</div>
</label>
<!-- Mode 2: Prediction -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="game_mode" type="radio" value="prediction"/>
<div class="flex items-start p-6 rounded-xl bg-surface-bright border-2 border-transparent peer-checked:border-primary peer-checked:bg-white hover:bg-surface-container transition-all">
<div class="mr-4 text-on-surface-variant bg-surface-dim p-3 rounded-full flex items-center justify-center group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[32px]">psychology</span>
</div>
<div class="flex-1">
<h4 class="font-headline-md text-headline-md text-on-background mb-1">Prediction</h4>
<p class="font-body-md text-body-md text-on-surface-variant">Gelecekteki senaryolar hakkında partnerinin ne tepki vereceğini tahmin et.</p>
</div>
<div class="ml-4 text-on-surface-variant opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined icon-fill text-[28px]">check_circle</span>
</div>
</div>
</label>
<!-- Mode 3: Orderline -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="game_mode" type="radio" value="orderline"/>
<div class="flex items-start p-6 rounded-xl bg-surface-bright border-2 border-transparent peer-checked:border-primary peer-checked:bg-white hover:bg-surface-container transition-all">
<div class="mr-4 text-on-surface-variant bg-surface-dim p-3 rounded-full flex items-center justify-center group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[32px]">reorder</span>
</div>
<div class="flex-1">
<h4 class="font-headline-md text-headline-md text-on-background mb-1">Orderline</h4>
<p class="font-body-md text-body-md text-on-surface-variant">Seçenekleri kendi önceliklerine göre sırala.</p>
</div>
<div class="ml-4 text-on-surface-variant opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined icon-fill text-[28px]">check_circle</span>
</div>
</div>
</label>
</div>
</div>
<hr class="border-outline-variant/20"/>
<!-- Question Count Selector -->
<div class="space-y-4">
<div class="flex items-center justify-between mb-2">
<h3 class="font-headline-md text-headline-md text-on-background">Soru Sayısı</h3>
</div>
<div class="flex gap-4">
<!-- 10 Questions -->
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="question_count" type="radio" value="10"/>
<div class="text-center p-4 rounded-xl border-2 border-outline-variant/30 bg-white peer-checked:border-primary peer-checked:bg-primary-container/10 peer-checked:text-primary transition-all hover:bg-surface-container-low text-on-surface-variant">
<span class="font-headline-lg text-headline-lg block">10</span>
<span class="font-label-md text-label-md">Kısa</span>
</div>
</label>
<!-- 20 Questions -->
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="question_count" type="radio" value="20"/>
<div class="text-center p-4 rounded-xl border-2 border-outline-variant/30 bg-white peer-checked:border-primary peer-checked:bg-primary-container/10 peer-checked:text-primary transition-all hover:bg-surface-container-low text-on-surface-variant">
<span class="font-headline-lg text-headline-lg block">20</span>
<span class="font-label-md text-label-md">Normal</span>
</div>
</label>
<!-- 50 Questions (Premium) -->
<label class="flex-1 cursor-pointer relative">
<input class="peer sr-only" name="question_count" type="radio" value="50"/>
<div class="absolute -top-3 -right-2 bg-tertiary-container text-on-tertiary-container p-1 rounded-full shadow-sm z-10 flex items-center justify-center border border-white">
<span class="material-symbols-outlined icon-fill text-[16px]">stars</span>
</div>
<div class="text-center p-4 rounded-xl border-2 border-tertiary-container/30 bg-white peer-checked:border-tertiary-container peer-checked:bg-tertiary-container/10 peer-checked:text-tertiary transition-all hover:bg-tertiary-fixed/20 text-on-surface-variant">
<span class="font-headline-lg text-headline-lg block text-tertiary">50</span>
<span class="font-label-md text-label-md text-tertiary/80">Derin</span>
</div>
</label>
</div>
</div>
<!-- CTA -->
<div class="pt-6 mt-8 flex justify-center">
<button class="w-full md:w-auto bg-primary hover:bg-primary/90 text-white font-headline-md text-headline-md py-4 px-12 rounded-full shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:-translate-y-1 transition-all flex items-center justify-center gap-3 min-h-[56px]" type="submit">
<span>Oyun linki oluştur</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
</body></html>
